###############################################################################
# Document Conversion Service – Docker Compose
# Services: LocalStack (SQS+S3), RabbitMQ, Kafka (KRaft), Temporal, App
###############################################################################
version: "3.9"

x-common-env: &common-env
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: us-east-1

services:
  # ═════════════════════════ Infrastructure ══════════════════════════════════

  localstack:
    image: localstack/localstack:3.4
    container_name: docconv-localstack
    ports:
      - "4566:4566"
    environment:
      <<: *common-env
      SERVICES: sqs,s3
      DEBUG: 0
      EAGER_SERVICE_LOADING: 1
    volumes:
      - "./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init.sh"
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: docconv-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: docconv
      RABBITMQ_DEFAULT_PASS: docconv
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: docconv-kafka
    ports:
      - "9092:9092"
    environment:
      # ── KRaft mode (no ZooKeeper) ──
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
      # ── Listeners ──
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # ── Topic defaults ──
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # ── Log dirs ──
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  ftp:
    image: fauria/vsftpd:latest
    container_name: docconv-ftp
    ports:
      - "21:21"
      - "21100-21110:21100-21110"
    environment:
      FTP_USER: docconv
      FTP_PASS: docconv
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
      PASV_ADDRESS: ftp
    volumes:
      - ftp_data:/home/vsftpd/docconv

  # ═══════════════════════ Temporal.io Stack ═════════════════════════════════

  temporal-postgresql:
    image: postgres:16-alpine
    container_name: docconv-temporal-db
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal-server:
    image: temporalio/auto-setup:latest
    container_name: docconv-temporal
    ports:
      - "7233:7233"          # gRPC frontend
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - TEMPORAL_ADDRESS=temporal-server:7233
      - TEMPORAL_CLI_ADDRESS=temporal-server:7233
    volumes:
      - "./config/temporal/development-sql.yaml:/etc/temporal/config/dynamicconfig/development-sql.yaml:ro"
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s

  temporal-admin-tools:
    image: temporalio/admin-tools:latest
    container_name: docconv-temporal-admin
    depends_on:
      temporal-server:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal-server:7233
      - TEMPORAL_CLI_ADDRESS=temporal-server:7233
    volumes:
      - "./temporal-workflows:/workflows:ro"
    stdin_open: true
    tty: true

  temporal-ui:
    image: temporalio/ui:latest
    container_name: docconv-temporal-ui
    ports:
      - "8088:8080"          # Temporal Web UI
    depends_on:
      temporal-server:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal-server:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000

  # ═══════════════════════ Application ══════════════════════════════════════

  docconv-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docconv-app
    ports:
      - "8080:8080"
    depends_on:
      localstack:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      kafka:
        condition: service_healthy
      temporal-server:
        condition: service_healthy
    environment:
      <<: *common-env
      # ── Feature flags ──
      ENABLE_API: "true"
      ENABLE_SQS: "true"
      ENABLE_RABBITMQ: "true"
      ENABLE_KAFKA: "true"
      ENABLE_TEMPORAL: "true"
      USE_TEMPORAL_WORKFLOWS: "true"       # route jobs through Temporal
      # ── Endpoints ──
      SQS_ENDPOINT_URL: http://localstack:4566
      SQS_QUEUE_NAME: docconv-jobs
      S3_ENDPOINT_URL: http://localstack:4566
      S3_OUTPUT_BUCKET: docconv-output
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: docconv
      RABBITMQ_PASS: docconv
      RABBITMQ_QUEUE: docconv-jobs
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: docconv-jobs
      KAFKA_GROUP_ID: docconv-group
      FTP_HOST: ftp
      # ── Temporal ──
      TEMPORAL_HOST: temporal-server:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: docconv-tasks
      # ── Tuning ──
      CHUNK_SIZE: "65536"
      TMP_DIR: /tmp/docconv
      LOG_LEVEL: INFO
    volumes:
      - tmp_data:/tmp/docconv
    restart: unless-stopped

volumes:
  localstack_data:
  rabbitmq_data:
  ftp_data:
  tmp_data:
  temporal_db_data:
